# Database in production - use environment variables

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.data.redis.host=${DB_REDIS_HOST:localhost}
spring.data.redis.port=${DB_REDIS_PORT:6379}

# Minimum logs in prod

spring.jpa.show-sql=false
logging.level.com.julian=INFO
logging.level.org.springframework.web=WARN

# Swagger disabled in prod

springdoc.swagger-ui.enabled=false