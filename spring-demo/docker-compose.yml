services:
  app:
    build: .
    container_name: spring-demo-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_REDIS_HOST: ${DB_REDIS_HOST}
      DB_REDIS_PORT: ${DB_REDIS_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - spring-network

  postgres:
    image: postgres:15
    container_name: spring-demo-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spring-network

  redis:
    image: redis:7
    container_name: spring-demo-redis
    ports:
      - "6379:6379"
    networks:
      - spring-network

networks:
  spring-network:
    driver: bridge

volumes:
  postgres-data: